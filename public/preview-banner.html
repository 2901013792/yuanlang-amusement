<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆郎游乐 - 新设计预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- 方案 1：深蓝色毛玻璃 -->
    <section class="relative py-32 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-900 via-blue-600 to-blue-900"></div>
        <div class="absolute inset-0 backdrop-blur-sm bg-white/5"></div>
        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center">
            <div class="inline-block mb-6">
                <div class="bg-white/20 backdrop-blur-md px-6 py-2 rounded-full text-white text-sm font-medium border border-white/30">
                    ✨ 10 年专注 · 品质保证
                </div>
            </div>
            <h1 class="text-5xl md:text-7xl font-bold mb-6 text-white">关于圆郎游乐</h1>
            <p class="text-xl md:text-2xl text-white/90 max-w-3xl mx-auto mb-12">10 年专注儿童游乐设备制造，为孩子创造快乐童年</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-4xl mx-auto">
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20">
                    <div class="text-4xl font-bold text-white mb-2">2013</div>
                    <div class="text-white/80 text-sm">成立年份</div>
                </div>
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20">
                    <div class="text-4xl font-bold text-white mb-2">1000+</div>
                    <div class="text-white/80 text-sm">成功案例</div>
                </div>
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20">
                    <div class="text-4xl font-bold text-white mb-2">50+</div>
                    <div class="text-white/80 text-sm">出口国家</div>
                </div>
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20">
                    <div class="text-4xl font-bold text-white mb-2">24h</div>
                    <div class="text-white/80 text-sm">技术支持</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 方案 2：橙色毛玻璃 -->
    <section class="relative py-32 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-orange-600 via-orange-500 to-red-600"></div>
        <div class="absolute inset-0 backdrop-blur-sm bg-white/5"></div>
        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center">
            <div class="inline-block mb-6">
                <div class="bg-white/20 backdrop-blur-md px-6 py-2 rounded-full text-white text-sm font-medium border border-white/30">
                    🎢 100+ 款产品 · 全场景覆盖
                </div>
            </div>
            <h1 class="text-5xl md:text-7xl font-bold mb-6 text-white">产品中心</h1>
            <p class="text-xl md:text-2xl text-white/90 max-w-3xl mx-auto">100+ 款游乐设备，满足各种场景需求</p>
        </div>
    </section>

    <!-- 方案 3：蓝色渐变简约 -->
    <section class="relative py-32 overflow-hidden bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">
        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center">
            <h1 class="text-5xl md:text-7xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">简洁专业</h1>
            <p class="text-xl md:text-2xl text-gray-300 max-w-3xl mx-auto">备选方案：纯色渐变，无毛玻璃效果</p>
        </div>
    </section>
</body>
</html>
